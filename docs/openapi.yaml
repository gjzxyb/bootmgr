      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Image' }
      responses:
        '201': { description: Image created. }
        '400': { description: Invalid image payload. }
  /images/upload:
    post:
      summary: Upload image file and create a verified image record.
      description: Validates status and architecture, stores the file under IMAGE_STORAGE_DIR, computes SHA256 and size, and marks the image tested_passed.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                name: { type: string }
                os_family: { type: string }
                os_version: { type: string }
                architecture: { type: string, enum: [x86_64, arm64] }
                status: { type: string, enum: [enabled, disabled] }
      responses:
        '201': { description: Image uploaded and registered. }
        '400': { description: Missing or invalid upload. }
  /images/{id}:
    patch:
      summary: Update image.
      description: Validates status and architecture. file_path must resolve inside IMAGE_STORAGE_DIR. test_status, sha256, and size_bytes cannot be written directly. Updating file_path resets verification to untested.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Image' }
      responses:
        '200': { description: Image updated. }
        '400': { description: Invalid image payload. }
    delete:
      summary: Delete an unreferenced image.
      description: Requires admin role and X-Confirm-Action image.delete. Returns 409 when any deployment references the image; disable referenced images instead of deleting them.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '204': { description: Image deleted. }
        '409': { description: Image is referenced by deployment records. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /images/{id}/verify:
    post:
      summary: Verify image file SHA256 and size.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Verification result. }
  /install-templates:
    get:
      summary: List install templates.
      description: Demo seeder includes Ubuntu Server 24.04 Autoinstall, Rocky Linux 9 Kickstart, and Debian 12 Preseed templates.
      responses:
        '200':
          description: Template array or paged result.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: '#/components/schemas/InstallTemplate' }
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/InstallTemplate' }
                      total: { type: integer }
                      page: { type: integer }
                      page_size: { type: integer }
    post:
      summary: Create install template.
      description: Validates name, template_type, content, status, and variables_schema before writing.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstallTemplate' }
      responses:
        '201':
          description: Template created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstallTemplate' }
        '400': { description: Invalid install template payload. }
  /install-templates/{id}:
    patch:
      summary: Update install template.
      description: Merges submitted fields into the existing template, ignores backend-owned system fields, and applies create-time validation.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InstallTemplate' }
      responses:
        '200':
          description: Template updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InstallTemplate' }
        '400': { description: Invalid install template payload. }
    delete:
      summary: Delete an unreferenced install template.
      description: Requires admin role and X-Confirm-Action install_template.delete. Returns 409 when any deployment references the template; disable referenced templates instead of deleting them.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '204': { description: Install template deleted. }
        '409': { description: Install template is referenced by deployment records. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /workflow-templates:
    get:
      summary: List workflow templates.
      responses:
        '200':
          description: Workflow template array or paged result.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: '#/components/schemas/WorkflowTemplate' }
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/WorkflowTemplate' }
                      total: { type: integer }
                      page: { type: integer }
                      page_size: { type: integer }
    post:
      summary: Create workflow template.
      description: Validates name, status, and definition.steps[].name/action before writing.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkflowTemplate' }
      responses:
        '201':
          description: Workflow template created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowTemplate' }
        '400': { description: Invalid workflow template payload. }
  /workflow-templates/{id}:
    patch:
      summary: Update workflow template.
      description: Merges submitted fields into the existing template, ignores backend-owned system fields, and applies create-time validation.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WorkflowTemplate' }
      responses:
        '200':
          description: Workflow template updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WorkflowTemplate' }
        '400': { description: Invalid workflow template payload. }
    delete:
      summary: Delete an unreferenced workflow template.
      description: Requires admin role and X-Confirm-Action workflow_template.delete. Returns 409 when any deployment references the template; disable referenced templates instead of deleting them.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '204': { description: Workflow template deleted. }
        '409': { description: Workflow template is referenced by deployment records. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /deployments:
    get:
      summary: List deployments.
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: server_id, in: query, schema: { type: integer } }
        - { name: image_id, in: query, schema: { type: integer } }
        - { name: network_id, in: query, schema: { type: integer } }
        - { name: requested_by, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: Deployment array or paged result. }
    post:
      summary: Create deployment and start simulated workflow.
      description: >-
        Requires X-Confirm-Action: deployment.create and erase_confirmed=true.
        erase_policy accepts none, quick, full, or external_verified and defaults to quick.
        variables must be a JSON object when provided; template_id, workflow_id, and network_id must be greater than 0 when provided.
        Preflight verifies deployable server state, selected enabled deployment network when provided, at least one enabled deployment network, verified image, and enabled templates. BMC is optional per target: when a BMC endpoint is configured, connectivity is checked through the configured adapter; when no BMC endpoint is configured, deployment can proceed through PXE/manual power operation and SSH/physical evidence flow.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Deployment' }
      responses:
        '201': { description: Deployment created. }
        '400': { description: Invalid deployment request or preflight failure. }
        '404': { description: Server not found. }
        '409': { description: Server already has an active deployment or is not in a deployable state. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /deployments/preflight:
    post:
      summary: Dry-run deployment preflight.
      description: >-
        Runs deployment creation checks without requiring X-Confirm-Action and without creating deployment records.
        The request may use server_id for a single target or server_ids for batch preview. The response reports
        target checks, blocking problems, warnings, operator_actions, and whether each target will use BMC power
        control or the manual power/PXE/SSH evidence path for machines without BMC.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Deployment'
                - type: object
                  properties:
                    server_ids:
                      type: array
                      minItems: 1
                      maxItems: 20
                      items: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Deployment preflight result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeploymentPreflightResult' }
        '400': { description: Invalid preflight request. }
  /deployments/batch:
    post:
      summary: Create deployments for up to 20 servers.
      description: >-
        Requires X-Confirm-Action: deployment.batch-create and erase_confirmed=true.
        Uses server_ids instead of server_id and may include network_id to bind every created deployment to the same enabled deployment network.
        The request is all-or-nothing: every target must pass preflight before any deployment is created.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/Deployment'
                - type: object
                  required: [server_ids, image_id, erase_confirmed]
                  properties:
                    server_ids:
                      type: array
                      minItems: 1
                      maxItems: 20
                      items: { type: integer, minimum: 1 }
      responses:
        '201': { description: Batch deployments created. }
        '400': { description: Invalid batch request or preflight failure. }
        '409': { description: Any server already has an active deployment or is not deployable. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /deployments/{id}:
    get:
      summary: Get deployment.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Deployment detail. }
  /deployments/{id}/cancel:
    post:
      summary: Cancel deployment.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Deployment cancelled. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /deployments/{id}/retry:
    post:
      summary: Retry a failed or cancelled deployment.
      description: >-
        Requires X-Confirm-Action: deployment.retry.
        Reuses the original server, image, templates, workflow, and variables, reruns deployment preflight, clears the previous error, and creates a new workflow run.
        Deployment logs keep prior workflow run history and mark attempts.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Deployment requeued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Deployment' }
        '400': { description: Deployment preflight failed. }
        '404': { description: Deployment or server not found. }
        '409': { description: Deployment is not retryable or server is busy. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /deployments/{id}/logs:
    get:
      summary: List deployment workflow logs.
      description: Returns latest workflow, latest task logs, all workflow run attempts, task counters, and duration_ms fields for deployment troubleshooting.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Deployment workflow log bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeploymentLogs' }
  /servers/bmc/batch-power:
    post:
      summary: Run batch BMC power operation.
      description: Requires action-specific confirmation header. action=power-on requires X-Confirm-Action bmc.batch-power-on; action=power-off requires bmc.batch-power-off; action=reboot requires bmc.batch-reboot. At most 50 unique non-zero server IDs are accepted. Each target returns an independent success or failure result and receives a high-risk audit record.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action, server_ids]
              properties:
                action: { type: string, enum: [power-on, power-off, reboot] }
                server_ids:
                  type: array
                  maxItems: 50
                  items: { type: integer, minimum: 1 }
      responses:
        '200':
          description: Batch power operation finished with per-target results.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchBmcPowerResponse' }
        '400': { description: Invalid action or target list. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/bmc:
    post:
      summary: Configure BMC endpoint.
      description: Requires an existing non-retired, non-scrapped server. Redfish endpoints require an http/https URL and protocol must match the URL scheme; production Redfish rejects http:// endpoints and requires REDFISH_INSECURE_TLS=false with a trusted BMC certificate chain. IPMI endpoints require protocol=ipmi and a valid host/IP or host:port. Saving or updating resets status to unknown until the next connectivity check.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BmcEndpoint' }
      responses:
        '200': { description: BMC endpoint saved. }
        '400': { description: Invalid BMC endpoint type, protocol, endpoint, or username. }
        '404': { description: Server not found. }
        '409': { description: BMC operation is not allowed for retired or scrapped server. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/bmc/power:
    get:
      summary: Get BMC power state.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Power state. }
        '404': { description: BMC endpoint not found. }
  /servers/{id}/bmc/firmware:
    get:
      summary: Get BMC firmware information.
      description: Read-only BMC/BIOS firmware inventory query. It remains available for retired or scrapped servers for troubleshooting and does not require a confirmation header.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: BMC firmware information.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BMCFirmwareInfo' }
        '404': { description: BMC endpoint not found. }
        '502': { description: BMC adapter firmware query failed. }
  /servers/{id}/bmc/power-on:
    post:
      summary: Power on server.
      description: Requires X-Confirm-Action bmc.power-on. Rejected for retired or scrapped servers.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Power action result. }
        '400': { description: Power action failed. }
        '404': { description: BMC endpoint not found. }
        '409': { description: BMC operation is not allowed for retired or scrapped server. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/bmc/power-off:
    post:
      summary: Power off server.
      description: Requires X-Confirm-Action bmc.power-off. Rejected for retired or scrapped servers.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Power action result. }
        '400': { description: Power action failed. }
        '404': { description: BMC endpoint not found. }
        '409': { description: BMC operation is not allowed for retired or scrapped server. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/bmc/reboot:
    post:
      summary: Reboot server.
      description: Requires X-Confirm-Action bmc.reboot. Rejected for retired or scrapped servers.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Power action result. }
        '400': { description: Power action failed. }
        '404': { description: BMC endpoint not found. }
        '409': { description: BMC operation is not allowed for retired or scrapped server. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/bmc/check:
    post:
      summary: Check BMC connectivity.
      description: Rejected for retired or scrapped servers. Adapter failures mark the endpoint as error and return 502. On success, the response includes non-secret Redfish/IPMI firmware and hardware identity proof when available.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Check result with optional physical identity proof.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BMCCheckResponse' }
        '404': { description: BMC endpoint not found. }
        '409': { description: BMC operation is not allowed for retired or scrapped server. }
        '502':
          description: BMC adapter connectivity check failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BMCCheckResponse' }
  /servers/{id}/metrics:
    get:
      summary: List recent metric samples.
      description: Returns up to 200 samples for the server within the 7-day retention window.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Metric sample array. }
        '404': { description: Server not found. }
  /servers/{id}/ssh:
    get:
      summary: Get SSH Agentless access configuration.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: SSH access configuration. }
        '404': { description: SSH access not found. }
    post:
      summary: Upsert SSH Agentless access configuration.
      description: Requires an existing server that is not retired or scrapped. Host must be a valid hostname or IP; port must be 1-65535; auth_type must be password or private_key. In COLLECTOR_MODE=ssh and SSH_OPERATIONS_MODE=ssh the built-in Go SSH executor supports stored password and private_key credentials. SSH_HOST_KEY_POLICY supports insecure_ignore and known_hosts; production SSH modes require known_hosts with a readable SSH_KNOWN_HOSTS_PATH.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SSHAccess' }
      responses:
        '200': { description: SSH access saved. }
        '400': { description: Invalid SSH access configuration. }
        '404': { description: Server not found. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/ssh/check:
    post:
      summary: Check SSH connectivity.
      description: Server must exist and cannot be retired or scrapped. Uses stored SSHAccess credentials through the Go SSH executor, marks SSHAccess status ok or error, writes an ssh.check audit record, and returns non-secret proof fields for the command and SSH host key. When SSH_HOST_KEY_POLICY=known_hosts succeeds, proof.host_key_verified is true and proof.host_key_sha256 contains the verified host key fingerprint. Failed checks include proof.stage such as config, dial, handshake, session, or command when that stage can be identified.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: SSH check succeeded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SSHCheckResponse' }
        '404': { description: Server or SSH access not found. }
        '409': { description: Server is retired or scrapped. }
        '502':
          description: SSH connectivity check failed; response may include partial proof fields such as host key policy/fingerprint when the handshake reached that step.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SSHCheckResponse' }
  /servers/{id}/collections:
    get:
      summary: List collection jobs for one server.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Collection job array. }
        '404': { description: Server not found. }
    post:
      summary: Start SSH Agentless collection.
      description: Server must exist and cannot be retired or scrapped.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '201': { description: Collection job created. }
        '400': { description: Server is retired or scrapped. }
        '404': { description: Server not found. }
  /collections:
    get:
      summary: List collection jobs globally.
      parameters:
        - { name: server_id, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { type: string } }
        - { name: mode, in: query, schema: { type: string } }
        - { name: requested_by, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: Collection job array or paged result. }
  /log-events:
    get:
      summary: List platform and server log events.
      parameters:
        - { name: keyword, in: query, schema: { type: string } }
        - { name: server_id, in: query, schema: { type: integer } }
        - { name: source, in: query, schema: { type: string } }
        - { name: level, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: Log event array or paged result. }
  /alerts:
    get:
      summary: List alerts.
      responses:
        '200': { description: Alert array or paged result. }
  /alert-rules:
    get:
      summary: List alert rules.
      parameters:
        - { name: keyword, in: query, schema: { type: string } }
        - { name: metric_name, in: query, schema: { type: string } }
        - { name: severity, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: Alert rule array or paged result. }
    post:
      summary: Create alert rule.
      description: Validates rule_id, metric_name, operator, severity, and status.
      responses:
        '201': { description: Alert rule created. }
        '400': { description: Invalid alert rule. }
  /alert-rules/{id}:
    patch:
      summary: Update alert rule.
      description: Validates the final alert rule before writing changes.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Alert rule updated. }
        '400': { description: Invalid alert rule. }
  /alert-rules/evaluate:
    post:
      summary: Evaluate enabled alert rules against latest metric samples.
      description: Uses the latest sample per server and metric within the 7-day retention window. Existing firing or acknowledged alerts for the same server and rule are refreshed and counted as deduplicated; resolved alerts remain historical and can be retriggered as a new firing alert.
      responses:
        '200':
          description: Evaluation summary and created alerts.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AlertEvaluationResponse' }
  /alerts/{id}/ack:
    post:
      summary: Acknowledge alert.
      description: note max length is 1000. Already acknowledged or resolved alerts cannot be acknowledged again.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 1000 }
      responses:
        '200': { description: Alert acknowledged. }
        '400': { description: Invalid note or alert state. }
  /alerts/{id}/resolve:
    post:
      summary: Resolve alert.
      description: note max length is 1000. Already resolved alerts cannot be resolved again.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 1000 }
      responses:
        '200': { description: Alert resolved. }
        '400': { description: Invalid note. }
  /alerts/{id}/events:
    get:
      summary: List alert handling events.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Alert event array. }
  /ops/script-jobs:
    get:
      summary: List script jobs.
      responses:
        '200': { description: Script job array or paged result. }
    post:
      summary: Create script job.
      description: >-
        Requires X-Confirm-Action: ops.script.create.
        Targets must exist, be unique, and not be retired or scrapped.
        At most 100 servers; concurrency max 50; timeout max 3600 seconds.
        The MVP simulator advances executions in batches according to concurrency.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [script, server_ids]
              properties:
                name: { type: string }
                script: { type: string, maxLength: 16000 }
                server_ids:
                  type: array
                  maxItems: 100
                  uniqueItems: true
                  items: { type: integer, minimum: 1 }
                concurrency: { type: integer, minimum: 1, maximum: 50 }
                timeout_seconds: { type: integer, minimum: 1, maximum: 3600 }
      responses:
        '201': { description: Script job created. }
        '400': { description: Invalid script job request. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /ops/script-jobs/{id}:
    get:
      summary: Get script job.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Script job detail. }
  /ops/script-jobs/{id}/results:
    get:
      summary: List script execution results.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Script execution array. }
        '404': { description: Script job not found. }
  /ops/log-collections:
    post:
      summary: Collect syslog, dmesg, and hardware logs.
      description: >-
        Requires X-Confirm-Action: ops.logs.collect.
        Targets must be unique, cannot be retired or scrapped, and are limited to 100 servers.
        Default mode writes simulated LogEvent records; SSH_OPERATIONS_MODE=ssh reads logs from real hosts through the stored SSHAccess configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_ids]
              properties:
                server_ids:
                  type: array
                  maxItems: 100
                  uniqueItems: true
                  items: { type: integer, minimum: 1 }
                sources:
                  type: array
                  items: { type: string, enum: [syslog, dmesg, hardware] }
      responses:
        '201':
          description: Log collection created events.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LogCollectionResponse' }
        '400': { description: Invalid target list or source list. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /ops/terminal-sessions:
    get:
      summary: List terminal sessions.
      description: Automatically closes active sessions older than TERMINAL_SESSION_TTL_MINUTES before returning rows.
      responses:
        '200':
          description: Terminal session array or paged result.
          content:
            application/json:
              schema:
                oneOf:
                  - type: array
                    items: { $ref: '#/components/schemas/TerminalSession' }
                  - type: object
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/TerminalSession' }
                      total: { type: integer }
                      page: { type: integer }
                      page_size: { type: integer }
    post:
      summary: Open terminal session.
      description: >-
        Requires X-Confirm-Action: ops.terminal.open.
        Server must exist and not be retired or scrapped; reason max length is 255.
        Default mode opens a simulated transcript; SSH_OPERATIONS_MODE=ssh validates the real SSH host through stored SSHAccess.
        Active sessions are later auto-closed by TERMINAL_SESSION_TTL_MINUTES during list/detail reads.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [server_id]
              properties:
                server_id: { type: integer, minimum: 1 }
                reason: { type: string, maxLength: 255 }
      responses:
        '201':
          description: Terminal session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerminalSession' }
        '400': { description: Invalid terminal session request. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /ops/terminal-sessions/{id}:
    get:
      summary: Get terminal session transcript.
      description: Automatically closes expired active sessions before loading the requested session.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Terminal session detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerminalSession' }
  /ops/terminal-sessions/{id}/commands:
    post:
      summary: Run a command in a terminal session.
      description: >-
        Requires X-Confirm-Action: ops.terminal.command.
        The session must be active.
        In SSH mode the command is executed on the real host through Go SSH; in simulated mode the command is appended to the transcript without remote execution.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TerminalCommandRequest' }
      responses:
        '200':
          description: Terminal session with updated transcript.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerminalSession' }
        '400': { description: Invalid command or inactive session. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /ops/terminal-sessions/{id}/close:
    post:
      summary: Close terminal session.
      description: "Requires X-Confirm-Action: ops.terminal.close."
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Terminal session closed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TerminalSession' }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /ops/backup/export:
    get:
      summary: Export MVP backup JSON.
      description: >-
        Requires admin role and X-Confirm-Action: ops.backup.export.
        Credentials, SSH access configs, BMC endpoints, boot events, metadata tokens, and physical evidence records are intentionally excluded.
        Lab validation run batches and per-check results are included because they are non-sensitive audit history.
      responses:
        '200': { description: Backup JSON payload. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /ops/backup/validate:
    post:
      summary: Validate a backup JSON before restore.
      description: Admin-only dry run. Checks backup schema, version, row format, key uniqueness, references, lab validation run history references, tenant server quota usage, network configuration validity and overlap, deployment networks, alert rules, and target database state, including sensitive and runtime-only tables, without writing data.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Backup validation report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackupValidationReport' }
        '400': { description: Invalid backup JSON. }
  /ops/backup/restore:
    post:
      summary: Restore a validated backup JSON into a fresh target database.
      description: >-
        Requires admin role and X-Confirm-Action: ops.backup.restore.
        Reuses backup validation, rejects validation errors, and returns 409 unless the target is fresh.
        Runtime-only and sensitive tables are cleared, PostgreSQL/SQLite identity sequences are reset after import, ordinary restored users receive random disabled password hashes, and the current restore admin keeps the target-environment password as the recovery login.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Backup restored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackupRestoreResult' }
        '400': { description: Invalid backup JSON or validation errors. }
        '409': { description: Target database is not fresh. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /audit-logs:
    get:
      summary: List audit logs.
      responses:
        '200': { description: Audit log array or paged result. }
  /audit-logs/{id}:
    get:
      summary: Get audit log detail.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Audit log detail. }
