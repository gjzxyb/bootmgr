      responses:
        '201': { description: User created. }
        '400': { description: Invalid email, role, or password. }
  /users/{id}:
    patch:
      summary: Update user name or role.
      description: Admin role required. Role must be admin, operator, or viewer. Demoting the last admin user is rejected.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: User updated. }
        '400': { description: Invalid role. }
        '409': { description: Cannot demote the last admin user. }
  /users/{id}/reset-password:
    post:
      summary: Reset user password.
      description: Admin role required. Password must be at least 8 characters and include uppercase, lowercase, and digit characters.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Password reset. }
        '400': { description: Invalid password. }
  /tenants:
    get:
      summary: List tenants.
      description: Admin role required. MVP tenant records are used for ownership, filtering, and quota.servers server asset limits.
      parameters:
        - { name: keyword, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: Tenant array or paged result. }
    post:
      summary: Create tenant.
      description: Admin role required. Validates tenant_id, status, and quota JSON object. quota.servers must be a non-negative integer when present.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Tenant' }
      responses:
        '201':
          description: Tenant created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '400': { description: Invalid tenant payload. }
  /tenants/{id}:
    patch:
      summary: Update tenant.
      description: Admin role required. Ignores backend-owned tenant_id and timestamp fields, then validates status and quota JSON object. quota.servers cannot be lower than the tenant's current server usage.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Tenant' }
      responses:
        '200':
          description: Tenant updated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Tenant' }
        '400': { description: Invalid tenant payload. }
  /network-configs:
    get:
      summary: List network configurations.
      description: Network topology records for management, deployment and business networks.
      parameters:
        - { name: keyword, in: query, schema: { type: string } }
        - { name: purpose, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: NetworkConfig array or paged result. }
    post:
      summary: Create network configuration.
      description: Admin role required. Validates CIDR, gateway, DNS IP list, VLAN range, purpose, status, DHCP mode, and prevents overlapping enabled CIDRs with the same purpose.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NetworkConfig' }
      responses:
        '201': { description: NetworkConfig created. }
        '400': { description: Invalid network configuration. }
  /network-configs/{id}/check:
    post:
      summary: Check network configuration.
      description: Admin role required. Runs read-only deployment-network readiness checks for CIDR format, overlap, gateway, DNS, status, DHCP mode, PXE/DHCP/TFTP runtime configuration match, runtime address alignment with the deployment CIDR, and deployment usage without starting or stopping DHCP/TFTP services.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200':
          description: Network check report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NetworkCheckReport' }
        '404': { description: NetworkConfig not found. }
  /network-configs/{id}:
    patch:
      summary: Update network configuration.
      description: Admin role required. Validates the final network configuration before writing changes, including overlapping enabled CIDRs with the same purpose.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NetworkConfig' }
      responses:
        '200': { description: NetworkConfig updated. }
        '400': { description: Invalid network configuration. }
  /servers:
    get:
      summary: List servers.
      parameters:
        - { name: keyword, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: owner, in: query, schema: { type: string } }
        - { name: tenant_id, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
        - { name: page_size, in: query, schema: { type: integer } }
      responses:
        '200': { description: Server array or paged server result. }
    post:
      summary: Create server asset.
      description: Requires at least one of asset_no, hostname, or primary_mac. Validates status, architecture, IP, MAC, identity uniqueness, and active tenant reference.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Server' }
      responses:
        '201': { description: Server created. }
        '400': { description: Invalid server payload or inactive/missing tenant reference. }
  /servers/import:
    post:
      summary: Batch import server assets.
      description: Validates each server exactly like create, including identity uniqueness and active tenant references.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [servers]
              properties:
                servers:
                  type: array
                  items: { $ref: '#/components/schemas/Server' }
      responses:
        '200': { description: Import summary. }
        '400': { description: Invalid import payload or inactive/missing tenant reference. }
  /servers/{id}:
    get:
      summary: Get server.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '200': { description: Server detail. }
    patch:
      summary: Update server.
      description: Validates the final server asset, including status, architecture, IP, MAC, identity uniqueness, and active tenant reference. Backend-owned timestamp fields are ignored. Changing status to retired or scrapped requires X-Confirm-Action server.status-terminal.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Server' }
      responses:
        '200': { description: Server updated. }
        '400': { description: Invalid server payload or inactive/missing tenant reference. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
    delete:
      summary: Delete an unreferenced server asset.
      description: Requires admin role and X-Confirm-Action server.delete. Soft deletes only assets without business references; deployments, BMC/SSH configuration, inventories, metrics, logs, collection jobs, script executions, terminal sessions, metadata tokens, alerts, and retirement records return 409 blockers.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      responses:
        '204': { description: Server deleted. }
        '409': { description: Server has related records and cannot be deleted. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/retire:
    post:
      summary: Retire server.
      description: Requires X-Confirm-Action server.retire. Records retirement reason, erasure status, erasure method, and evidence. erase_status verified requires erase_method and evidence. Repeated retire requests are idempotent and do not create duplicate status history or retirement records; scrapped servers return 409.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetireServerRequest' }
      responses:
        '200':
          description: Server retired.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RetireServerResponse' }
        '400': { description: Invalid retirement payload. }
        '409': { description: Scrapped server cannot be retired. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /servers/{id}/scrap:
    post:
      summary: Scrap server.
      description: Requires X-Confirm-Action server.scrap. Records scrap reason, erasure status, erasure method, and evidence with to_status=scrapped. erase_status verified requires erase_method and evidence. Repeated scrap requests are idempotent and do not create duplicate status history or terminal records.
      parameters: [{ name: id, in: path, required: true, schema: { type: integer } }]
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetireServerRequest' }
      responses:
        '200':
          description: Server scrapped.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScrapServerResponse' }
        '400': { description: Invalid scrap payload. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
