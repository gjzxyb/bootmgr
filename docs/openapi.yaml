  /system/lab-validation:
    get:
      summary: Get physical lab validation report.
      description: Admin role required. Summarizes PXE/DHCP/TFTP runtime evidence, BMC endpoint status, SSH access status, safe readiness checks, recent validation runs, and recently recorded physical validation evidence for physical lab acceptance.
      responses:
        '200':
          description: Lab validation report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabValidationReport' }
        '403': { description: Admin role required. }
  /system/lab-validation/runs/{id}:
    get:
      summary: Get a persisted physical lab validation run.
      description: Admin role required. Returns one persisted validation run batch and its per-check results for audit and replay review.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Lab validation run detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabValidationRunDetail' }
        '400': { description: Invalid run id. }
        '403': { description: Admin role required. }
        '404': { description: Lab validation run not found. }
  /system/lab-validation/runs/{id}/evidence-bundle:
    get:
      summary: Export a physical lab validation evidence bundle.
      description: Admin role required. Returns one validation run, result rows, environment snapshot, readiness checks, related PXE BootEvents, BMC endpoints, SSH accesses, terminal transcripts, script executions, log events, recent physical evidence, a machine-readable operator checklist, and configuration/runtime issues. The bundle is read-only audit material and does not create physical evidence by itself.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, minimum: 1 } }
      responses:
        '200':
          description: Lab validation evidence bundle.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabValidationEvidenceBundle' }
        '400': { description: Invalid run id. }
        '403': { description: Admin role required. }
        '404': { description: Lab validation run not found. }
  /system/lab-validation/evidence:
    post:
      summary: Record physical lab validation evidence.
      description: >-
        Admin role and X-Confirm-Action system.lab-validation.evidence are required.
        Stores a non-secret summary that a real PXE client, optional physical BMC, real SSH host,
        or full-chain lab run was validated. subject identifies the MAC, BMC endpoint,
        SSH host, or lab run batch. BMC is optional per target: targets without BMC endpoints
        can complete full-chain validation with PXE and SSH proof. Optional run_id links the evidence to a finished
        validation run from the freshness window; ok BMC and ok SSH evidence require
        run_id from a recent finished strict run that checked the corresponding
        capability and contains adapter=redfish|ipmi structured BMC identity proof details or SSH
        known_hosts host key proof plus command/exit_code/stdout proof details. SSH
        proof requires host_key_policy=known_hosts, host_key_verified=true, and
        host_key_sha256 in the referenced run details.
        ok full-chain evidence requires run_id
        from a recent finished strict run that checked PXE and SSH and has
        successful target PXE/SSH results with those proof details; targets with BMC endpoints
        must also have successful BMC identity proof details in that run. The
        referenced run may have overall status error when full_chain_target failed
        only because full-chain evidence had not been recorded yet. Ok evidence
        must include platform references:
        PXE uses boot_event_id from a real http_ipxe or pxe_dhcp source; http_ipxe
        is only assigned to HTTP iPXE requests whose client IP is inside an
        enabled deployment network CIDR. BMC uses server_id with a current recent
        ok endpoint check whose type matches the current BMC_ADAPTER, SSH uses
        server_id with a current recent ok access check and production-safe host
        key verification, and full-chain evidence uses both server_id and a
        same-server real-source boot_event_id with current recent ok SSH
        checks; targets with BMC endpoints also require a current recent ok BMC check.
        api_event boot events are accepted for troubleshooting history
        but cannot produce ok physical evidence. physical_evidence only treats
        referenced ok evidence from the last 7 days as current proof, and in
        production only counts SSH evidence whose host key policy is valid.
      parameters:
        - name: X-Confirm-Action
          in: header
          required: true
          schema: { type: string, enum: [system.lab-validation.evidence] }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabValidationEvidenceRequest' }
      responses:
        '201':
          description: Evidence recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabValidationEvidence' }
        '400': { description: Invalid evidence payload. }
        '403': { description: Admin role required. }
        '428': { $ref: '#/components/responses/ConfirmationRequired' }
  /system/lab-validation/run:
    post:
      summary: Run safe physical lab connectivity checks.
      description: >-
        Admin role and X-Confirm-Action system.lab-validation.run are required.
        Runs read-only PXE HTTP/DHCP/TFTP probes, BMC connectivity checks for
        configured BMC endpoints, BMC tooling checks, and SSH lightweight checks
        for configured endpoints up to the requested limit. Synthetic DHCP probes
        do not create BootEvent evidence, and the HTTP iPXE probe sends
        X-Lab-Validation-Probe so it is recorded as api_event instead of physical
        http_ipxe evidence; pass pxe_macs to verify physical PXE client boot
        events. Strict PXE validation accepts fresh http_ipxe or pxe_dhcp events
        from the last 7 days, and when server_ids are also supplied each PXE
        BootEvent must either carry one of those server_ids or match a requested
        server primary_mac. The target matrix prefers the latest physical PXE
        event over later api_event troubleshooting records. Set strict=true for a
        physical acceptance gate that requires pxe_macs and server_ids for
        targets. BMC is optional per target: a non-simulated BMC adapter is
        required only when requested targets have BMC endpoints; targets without
        BMC endpoints can complete with PXE and SSH proof. Production SSH
        validation still requires SSH_HOST_KEY_POLICY=known_hosts with a readable
        SSH_KNOWN_HOSTS_PATH. It does not perform power operations or enable
        DHCP/TFTP listeners.
      parameters:
        - name: X-Confirm-Action
          in: header
          required: true
          schema: { type: string, enum: [system.lab-validation.run] }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LabValidationRunRequest' }
      responses:
        '200':
          description: Updated lab validation report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LabValidationReport' }
        '428': { description: Confirmation header is missing. }
  /users:
    get:
      summary: List users.
      description: Admin role required.
