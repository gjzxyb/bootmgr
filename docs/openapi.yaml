openapi: 3.0.3
info:
  title: Bare Metal Lifecycle Platform MVP API
  version: 0.1.0
  description: Unified bare metal lifecycle management platform MVP API draft.
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PageMeta:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }
    HealthStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        database: { type: string, enum: [ok, error] }
        redis: { type: string, enum: [ok, disabled, error] }
        error: { type: string }
    ConfigIssue:
      type: object
      properties:
        level: { type: string, enum: [error, warning] }
        key: { type: string }
        message: { type: string }
    ReadinessCheck:
      type: object
      properties:
        name: { type: string, enum: [database, redis, image_storage, pxe_services, config] }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    ReadinessStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        checks:
          type: array
          items: { $ref: '#/components/schemas/ReadinessCheck' }
        config_issues:
          type: array
          items: { $ref: '#/components/schemas/ConfigIssue' }
    BackupValidationCheck:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    BackupValidationReport:
      type: object
      properties:
        status: { type: string, enum: [ok, warning, error] }
        version: { type: string }
        generated_at: { type: string, format: date-time }
        totals:
          type: object
          additionalProperties: { type: integer }
        target_counts:
          type: object
          additionalProperties: { type: integer }
        checks:
          type: array
          items: { $ref: '#/components/schemas/BackupValidationCheck' }
    BackupRestoreResult:
      type: object
      properties:
        status: { type: string, enum: [restored] }
        imported:
          type: object
          additionalProperties: { type: integer }
        warnings:
          type: array
          items: { $ref: '#/components/schemas/BackupValidationCheck' }
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [admin, operator, viewer] }
    Tenant:
      type: object
      required: [tenant_id, name]
      properties:
        id:
          type: integer
          readOnly: true
        tenant_id:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._-]{0,79}$'
          description: Backend-owned after create. Update requests cannot change it.
        name: { type: string }
        status: { type: string, enum: [active, disabled], default: active }
        owner: { type: string }
        description: { type: string }
        quota:
          type: object
          additionalProperties: true
          description: Optional JSON object. Numeric quota values must be non-negative; quota.servers is enforced as a non-negative integer server asset limit.
    NetworkConfig:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        purpose: { type: string, enum: [management, deployment, business] }
        cidr:
          type: string
          description: Must be a valid CIDR prefix.
        gateway:
          type: string
          description: Optional IP address that must be inside cidr.
        dns: { type: string }
        vlan_id:
          type: integer
          minimum: 0
          maximum: 4094
        dhcp_mode: { type: string, enum: [proxy, builtin, external] }
        proxy_dhcp: { type: boolean }
        status: { type: string, enum: [enabled, disabled] }
        description: { type: string }
        created_by: { type: string }
    NetworkCheck:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    NetworkCheckReport:
      type: object
      properties:
        status: { type: string, enum: [ok, warning, error] }
        checks:
          type: array
          items: { $ref: '#/components/schemas/NetworkCheck' }
    MetadataNetworkInterface:
      type: object
      properties:
        name: { type: string }
        mac: { type: string }
        address: { type: string }
        network_id: { type: integer }
        network_name: { type: string }
        cidr: { type: string }
        gateway: { type: string }
        dns:
          type: array
          items: { type: string }
        vlan_id: { type: integer }
        dhcp_mode: { type: string, enum: [proxy, builtin, external] }
        proxy_dhcp: { type: boolean }
    MetadataNetwork:
      type: object
      properties:
        interfaces:
          type: array
          items: { $ref: '#/components/schemas/MetadataNetworkInterface' }
    MetadataSSHKeys:
      type: object
      properties:
        keys:
          type: array
          items: { type: string }
    Server:
      type: object
      properties:
        id: { type: integer }
        asset_no:
          type: string
          description: Unique when non-empty.
        hostname:
          type: string
          description: Unique when non-empty. Saved in lowercase.
        status:
          type: string
          enum: [discovered, ready, deploying, running, maintenance, retired, scrapped]
          default: discovered
        architecture:
          type: string
          enum: [x86_64, arm64]
          default: x86_64
        primary_ip:
          type: string
          description: Optional valid IP address.
        primary_mac:
          type: string
          description: Optional valid MAC address. Saved in lowercase colon-separated form and unique when non-empty.
        owner: { type: string }
        tenant_id:
          type: string
          description: Optional. When provided on create, update, or import, it must reference an active tenant.
        location: { type: string }
        rack: { type: string }
        rack_unit: { type: string }
        tags:
          description: JSON array or object used for CMDB labels and keyword search.
          oneOf:
            - type: array
              items: { type: string }
            - type: object
              additionalProperties: true
        notes: { type: string }
    RetireServerRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          description: Terminal lifecycle reason. Defaults according to the action when omitted.
        erase_status:
          type: string
          enum: [not_required, pending, verified, failed]
          default: not_required
        erase_method:
          type: string
          maxLength: 120
        evidence:
          type: string
          maxLength: 2000
          description: Required when erase_status is verified.
    RetirementRecord:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        from_status: { type: string }
        to_status: { type: string, enum: [retired, scrapped] }
        reason: { type: string }
        erase_status: { type: string, enum: [not_required, pending, verified, failed] }
        erase_method: { type: string }
        evidence: { type: string }
        requested_by: { type: string }
        requested_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    RetireServerResponse:
      type: object
      properties:
        status: { type: string, enum: [retired] }
        retirement: { $ref: '#/components/schemas/RetirementRecord' }
    ScrapServerResponse:
      type: object
      properties:
        status: { type: string, enum: [scrapped] }
        retirement: { $ref: '#/components/schemas/RetirementRecord' }
    Image:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        os_family: { type: string }
        os_version: { type: string }
        architecture: { type: string, enum: [x86_64, arm64], default: x86_64 }
        file_path:
          type: string
          description: Required for manual registration. Must resolve inside IMAGE_STORAGE_DIR. Relative paths are resolved under IMAGE_STORAGE_DIR. Updating this field resets verification to untested.
        size_bytes:
          type: integer
          format: int64
          readOnly: true
        sha256:
          type: string
          readOnly: true
        status: { type: string, enum: [enabled, disabled] }
        test_status:
          type: string
          enum: [untested, tested_passed, test_failed]
          readOnly: true
    InstallTemplate:
      type: object
      required: [name, template_type, content]
      properties:
        id:
          type: integer
          readOnly: true
        name: { type: string }
        os_family: { type: string }
        os_version: { type: string }
        template_type: { type: string, enum: [cloud-init, autoinstall, kickstart, preseed, unattend] }
        content: { type: string }
        variables_schema:
          type: object
          additionalProperties: true
        version: { type: string, default: v1 }
        status: { type: string, enum: [enabled, disabled], default: enabled }
        created_by:
          type: string
          readOnly: true
    WorkflowTemplate:
      type: object
      required: [name, definition]
      properties:
        id:
          type: integer
          readOnly: true
        name: { type: string }
        version: { type: string, default: v1 }
        description: { type: string }
        definition:
          type: object
          required: [steps]
          properties:
            steps:
              type: array
              minItems: 1
              items:
                type: object
                required: [name, action]
                properties:
                  name: { type: string }
                  action: { type: string }
        status: { type: string, enum: [enabled, disabled], default: enabled }
        created_by:
          type: string
          readOnly: true
    Deployment:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        image_id: { type: integer }
        template_id: { type: integer, nullable: true, minimum: 1 }
        workflow_id: { type: integer, nullable: true, minimum: 1 }
        network_id:
          type: integer
          nullable: true
          minimum: 1
          description: Optional selected enabled deployment network. When omitted, metadata falls back to the latest enabled deployment network for compatibility.
        variables:
          type: object
          additionalProperties: true
        erase_policy:
          type: string
          enum: [none, quick, full, external_verified]
          default: quick
          description: Deployment erase/reinstall policy selected before creation.
        erase_confirmed:
          type: boolean
          description: Must be true when creating a deployment.
        erase_confirmed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        status: { type: string }
        requested_by: { type: string }
        error_message: { type: string }
    DeploymentLogSummary:
      type: object
      properties:
        deployment_id: { type: integer }
        status: { type: string }
        latest_run_id: { type: integer }
        total_runs: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, format: int64 }
        task_total: { type: integer }
        task_success: { type: integer }
        task_failed: { type: integer }
        task_cancelled: { type: integer }
        task_running: { type: integer }
        task_pending: { type: integer }
    WorkflowRunLog:
      type: object
      properties:
        id: { type: integer }
        attempt: { type: integer }
        deployment_id: { type: integer }
        name: { type: string }
        version: { type: string }
        status: { type: string }
        definition: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, format: int64 }
        task_total: { type: integer }
        task_success: { type: integer }
        task_failed: { type: integer }
        task_cancelled: { type: integer }
        task_running: { type: integer }
        task_pending: { type: integer }
    TaskExecutionLog:
      type: object
      properties:
        id: { type: integer }
        workflow_run_id: { type: integer }
        step_name: { type: string }
        action: { type: string }
        status: { type: string }
        retry_count: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, format: int64 }
        stdout: { type: string }
        stderr: { type: string }
        error_message: { type: string }
    DeploymentLogs:
      type: object
      properties:
        summary: { $ref: '#/components/schemas/DeploymentLogSummary' }
        workflow:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/WorkflowRunLog'
        runs:
          type: array
          items: { $ref: '#/components/schemas/WorkflowRunLog' }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/TaskExecutionLog' }
    HardwareInventory:
      type: object
      properties:
        cpu_summary: { type: string }
        memory_summary: { type: string }
        disk_summary: { type: string }
        network_summary: { type: string }
        gpu_summary: { type: string }
        raid_summary: { type: string }
        collected_by: { type: string }
        raw_payload:
          type: object
          additionalProperties: true
    BmcEndpoint:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        type: { type: string, enum: [redfish, ipmi] }
        protocol: { type: string, enum: [http, https, ipmi] }
        endpoint:
          type: string
          description: Redfish requires an http/https URL; IPMI requires a valid host/IP or host:port.
        username: { type: string }
        status: { type: string }
        power_state: { type: string }
    BMCFirmwareInfo:
      type: object
      properties:
        adapter: { type: string }
        endpoint_status: { type: string }
        manufacturer: { type: string }
        model: { type: string }
        serial_number: { type: string }
        firmware_version: { type: string }
        bios_version: { type: string }
        bmc_version: { type: string }
        last_checked_at: { type: string, format: date-time }
    BatchBmcPowerResult:
      type: object
      properties:
        server_id: { type: integer }
        status: { type: string, enum: [success, failed] }
        power_state: { type: string }
        error: { type: string }
    BatchBmcPowerResponse:
      type: object
      properties:
        requested: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/BatchBmcPowerResult' }
    SSHAccess:
      type: object
      properties:
        server_id: { type: integer }
        host:
          type: string
          description: Valid hostname or IP address.
        port: { type: integer, minimum: 1, maximum: 65535, default: 22 }
        username: { type: string }
        auth_type: { type: string, enum: [password, private_key], default: password }
        status: { type: string }
    TerminalCommandRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
          maxLength: 4000
          description: Command appended to an active terminal session. Requires X-Confirm-Action ops.terminal.command.
    MetricSample:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        metric_name:
          type: string
          description: Examples include host_up, cpu_usage, memory_usage, disk_usage, disk_smart_health, network_rx_mbps, and network_tx_mbps. disk_smart_health uses 0 for healthy and 1 for abnormal.
        value: { type: number }
        unit: { type: string }
        collected_at: { type: string, format: date-time }
    CollectionJob:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        mode: { type: string }
        status: { type: string }
        requested_by: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string }
    LogEvent:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        source: { type: string }
        level: { type: string }
        message: { type: string }
        trace_id: { type: string }
        occurred_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    LogCollectionResult:
      type: object
      properties:
        server_id: { type: integer }
        status: { type: string, enum: [success, failed] }
        events:
          type: array
          items: { type: integer }
        error: { type: string }
    LogCollectionResponse:
      type: object
      properties:
        requested: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        events_created: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/LogCollectionResult' }
    TerminalSession:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        status: { type: string, enum: [active, closed] }
        mode: { type: string, enum: [simulated, ssh] }
        requested_by: { type: string }
        reason: { type: string, maxLength: 255 }
        transcript: { type: string }
        opened_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    Alert:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        severity: { type: string }
        status: { type: string }
        rule_id: { type: string }
        title: { type: string }
        description: { type: string }
        acknowledged_by: { type: string }
        resolved_by: { type: string }
        triggered_at: { type: string, format: date-time }
    AlertEvaluationResponse:
      type: object
      properties:
        created:
          type: integer
          description: Number of new firing alerts created.
        deduplicated:
          type: integer
          description: Number of matching firing or acknowledged alerts refreshed instead of duplicated.
        alerts:
          type: array
          items: { $ref: '#/components/schemas/Alert' }
    AlertRule:
      type: object
      properties:
        id: { type: integer }
        rule_id: { type: string }
        name: { type: string }
        description: { type: string }
        metric_name: { type: string }
        operator: { type: string, enum: ['>', '>=', '<', '<=', '=='] }
        threshold: { type: number }
        severity: { type: string, enum: [critical, warning, info] }
        status: { type: string, enum: [enabled, disabled] }
        created_by: { type: string }
    AuditLog:
      type: object
      properties:
        id: { type: integer }
        actor_email: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        risk_level: { type: string }
        request_id: { type: string }
        client_ip: { type: string }
        created_at: { type: string, format: date-time }
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
    NotFound:
      description: Resource not found.
    ConfirmationRequired:
      description: X-Confirm-Action header is required for this operation.
paths:
  /healthz:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Check service health.
      description: Checks database connectivity and Redis PING when REDIS_ADDR is configured.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
        '503':
          description: Database or Redis health check failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
  /readyz:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Check runtime readiness.
      description: Checks database, Redis, image storage, PXE/TFTP runtime prerequisites, and configuration validation issues.
      responses:
        '200':
          description: Readiness report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReadinessStatus' }
  /boot/ipxe:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Render server-specific iPXE script and auto-discover unknown MACs.
      parameters:
        - { name: mac, in: query, schema: { type: string } }
        - { name: arch, in: query, schema: { type: string } }
        - { name: firmware, in: query, schema: { type: string } }
      responses:
        '200': { description: iPXE script. }
  /boot/discovery.ipxe:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Render discovery iPXE script.
      responses:
        '200': { description: Discovery iPXE script. }
  /boot/linux-installer.ipxe:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Render generic Linux installer iPXE script.
      responses:
        '200': { description: Linux installer iPXE script. }
  /boot/events:
    post:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Record boot event, matching deployment context, and auto-discover unknown MACs.
      responses:
        '201': { description: Boot event recorded. }
  /metadata/instance-id:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata instance id by client IP.
      responses:
        '200': { description: Instance id text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/hostname:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata hostname by client IP.
      responses:
        '200': { description: Hostname text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/network:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata network JSON by client IP.
      responses:
        '200':
          description: Network metadata JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataNetwork' }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/ssh-keys:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return SSH public keys by client IP.
      responses:
        '200':
          description: SSH public keys JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataSSHKeys' }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/userdata:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return rendered userdata by client IP.
      responses:
        '200': { description: Userdata text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /userdata:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Compatibility alias for client-IP userdata.
      responses:
        '200': { description: Userdata text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/by-server/{id}/instance-id:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata instance id for a server.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Instance id text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
  /metadata/by-server/{id}/hostname:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata hostname for a server.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Hostname text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
  /metadata/by-server/{id}/network:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata network JSON for a server.
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
