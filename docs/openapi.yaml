openapi: 3.0.3
info:
  title: Bare Metal Lifecycle Platform MVP API
  version: 0.1.0
  description: Unified bare metal lifecycle management platform MVP API draft.
servers:
  - url: http://localhost:8080/api/v1
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PageMeta:
      type: object
      properties:
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    LoginResponse:
      type: object
      properties:
        token: { type: string }
        user: { $ref: '#/components/schemas/User' }
    HealthStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        database: { type: string, enum: [ok, error] }
        redis: { type: string, enum: [ok, disabled, error] }
        error: { type: string }
    ConfigIssue:
      type: object
      properties:
        level: { type: string, enum: [error, warning] }
        key: { type: string }
        message: { type: string }
    ReadinessCheck:
      type: object
      properties:
        name: { type: string, enum: [database, redis, image_storage, bmc_tooling, ssh_known_hosts, pxe_services, config] }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    ReadinessStatus:
      type: object
      properties:
        status: { type: string, enum: [ok, degraded] }
        checks:
          type: array
          items: { $ref: '#/components/schemas/ReadinessCheck' }
        config_issues:
          type: array
          items: { $ref: '#/components/schemas/ConfigIssue' }
    LabValidationCheck:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    LabBootEvent:
      type: object
      properties:
        id: { type: integer }
        mac: { type: string }
        architecture: { type: string }
        firmware: { type: string }
        remote_addr: { type: string }
        source: { type: string, enum: [http_ipxe, pxe_dhcp, api_event, unknown] }
        server_id: { type: integer, nullable: true }
        deployment_id: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
    LabBMCRef:
      type: object
      properties:
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        type: { type: string }
        protocol: { type: string }
        endpoint: { type: string }
        status: { type: string }
        power_state: { type: string }
        last_checked_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }
    LabSSHRef:
      type: object
      properties:
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        auth_type: { type: string, enum: [password, private_key] }
        status: { type: string }
        last_checked_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }
    LabTerminalSessionRef:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        status: { type: string }
        mode: { type: string, enum: [simulated, ssh] }
        requested_by: { type: string }
        reason: { type: string }
        transcript: { type: string }
        opened_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    LabScriptExecutionRef:
      type: object
      properties:
        id: { type: integer }
        script_job_id: { type: integer }
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        job_name: { type: string }
        status: { type: string, enum: [pending, running, success, failed] }
        exit_code: { type: integer }
        stdout: { type: string }
        stderr: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    LabLogEventRef:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        source: { type: string }
        level: { type: string }
        message: { type: string }
        trace_id: { type: string }
        occurred_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    LabValidationRunResult:
      type: object
      properties:
        id: { type: integer }
        run_id: { type: integer }
        kind: { type: string, enum: [strict_physical_targets, full_chain_target, pxe_http, pxe_dhcp, pxe_tftp, pxe_boot_event, bmc, ssh] }
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        status: { type: string, enum: [success, failed, skipped] }
        message: { type: string }
        details:
          type: object
          additionalProperties: true
          description: Structured non-secret probe details such as adapter=redfish|ipmi and BMC manufacturer/model/serial/firmware identity fields.
        checked_at: { type: string, format: date-time, nullable: true }
    LabValidationRunSummary:
      type: object
      properties:
        id: { type: integer }
        status: { type: string, enum: [ok, warning, error, running] }
        strict: { type: boolean }
        check_pxe: { type: boolean }
        check_bmc: { type: boolean }
        check_ssh: { type: boolean }
        limit: { type: integer }
        server_ids:
          type: array
          items: { type: integer }
        pxe_macs:
          type: array
          items: { type: string }
        pxe_probe_mac: { type: string }
        pxe_arch: { type: integer, enum: [0, 7, 9, 11] }
        ssh_probe_command: { type: string, maxLength: 255 }
        requested_by: { type: string }
        request_id: { type: string }
        started_at: { type: string, format: date-time }
        finished_at: { type: string, format: date-time, nullable: true }
        results: { type: integer }
        failures: { type: integer }
        skipped: { type: integer }
    LabValidationRunDetail:
      type: object
      properties:
        run: { $ref: '#/components/schemas/LabValidationRunSummary' }
        results:
          type: array
          items: { $ref: '#/components/schemas/LabValidationRunResult' }
    LabOperatorChecklistItem:
      type: object
      properties:
        subject: { type: string }
        step: { type: string, enum: [pxe_boot_event, bmc_identity, ssh_command, full_chain_evidence] }
        status: { type: string, enum: [ok, warning, pending, error, skipped] }
        message: { type: string }
        next_action: { type: string }
        run_id: { type: integer }
        server_id: { type: integer }
        boot_event_id: { type: integer, nullable: true }
        evidence_id: { type: integer, nullable: true }
        blocking_reasons:
          type: array
          items: { type: string }
    LabEvidenceCandidate:
      type: object
      description: Server-computed evidence payload draft that can be submitted to POST /system/lab-validation/evidence after operator review. Candidates are emitted only when the referenced run has enough physical PXE/SSH proof for that evidence kind; BMC proof is required only for targets with BMC configured.
      properties:
        kind: { type: string, enum: [pxe, bmc, ssh, full] }
        status: { type: string, enum: [ok] }
        subject: { type: string }
        summary: { type: string }
        details: { type: string }
        run_id: { type: integer }
        server_id: { type: integer }
        boot_event_id: { type: integer }
        source_step: { type: string, enum: [pxe_boot_event, bmc_identity, ssh_command, full_chain_evidence] }
    LabValidationEvidenceBundle:
      type: object
      properties:
        generated_at: { type: string, format: date-time }
        run: { $ref: '#/components/schemas/LabValidationRunSummary' }
        environment:
          type: object
          properties:
            app_env: { type: string }
            boot_base_url: { type: string }
            bmc_adapter: { type: string }
            collector_mode: { type: string }
            ssh_operations_mode: { type: string }
        checks:
          type: array
          items: { $ref: '#/components/schemas/LabValidationCheck' }
        results:
          type: array
          items: { $ref: '#/components/schemas/LabValidationRunResult' }
        boot_events:
          type: array
          items: { $ref: '#/components/schemas/LabBootEvent' }
        bmc_endpoints:
          type: array
          items: { $ref: '#/components/schemas/LabBMCRef' }
        ssh_accesses:
          type: array
          items: { $ref: '#/components/schemas/LabSSHRef' }
        terminal_sessions:
          type: array
          items: { $ref: '#/components/schemas/LabTerminalSessionRef' }
        script_executions:
          type: array
          items: { $ref: '#/components/schemas/LabScriptExecutionRef' }
        log_events:
          type: array
          items: { $ref: '#/components/schemas/LabLogEventRef' }
        recent_evidence:
          type: array
          items: { $ref: '#/components/schemas/LabValidationEvidence' }
        evidence_candidates:
          type: array
          description: Machine-readable candidate evidence records derived from the same operator checklist and proof rules used by the backend evidence validator.
          items: { $ref: '#/components/schemas/LabEvidenceCandidate' }
        targets:
          type: array
          items: { $ref: '#/components/schemas/LabValidationTarget' }
        config_issues:
          type: array
          items: { $ref: '#/components/schemas/ConfigIssue' }
        pxe_runtime_issues:
          type: array
          items: { $ref: '#/components/schemas/ConfigIssue' }
        notes:
          type: array
          items: { type: string }
        operator_checklist:
          type: array
          description: Machine-readable operator checklist for physical PXE, optional BMC identity, SSH command proof, and full-chain evidence references in this bundle. BMC checklist items are skipped when the target has no BMC endpoint, and ok only when this run has a successful result with adapter=redfish|ipmi structured identity details; SSH checklist items are ok only when this run has known_hosts host key proof plus command/exit_code/stdout details.
          items: { $ref: '#/components/schemas/LabOperatorChecklistItem' }
    LabValidationEvidence:
      type: object
      properties:
        id: { type: integer }
        kind: { type: string, enum: [pxe, bmc, ssh, full] }
        subject: { type: string }
        status: { type: string, enum: [ok, warning, error] }
        summary: { type: string }
        details: { type: string }
        artifact_url: { type: string, format: uri }
        run_id: { type: integer, nullable: true }
        server_id: { type: integer, nullable: true }
        boot_event_id: { type: integer, nullable: true }
        bmc_endpoint_id: { type: integer, nullable: true }
        ssh_access_id: { type: integer, nullable: true }
        created_by: { type: string }
        created_at: { type: string, format: date-time }
    LabValidationTarget:
      type: object
      properties:
        server_id: { type: integer }
        hostname: { type: string }
        asset_no: { type: string }
        primary_mac: { type: string }
        server_status: { type: string }
        pxe_status: { type: string, enum: [ok, stale, missing, api_only] }
        pxe_boot_event_id: { type: integer, nullable: true }
        pxe_boot_at: { type: string, format: date-time, nullable: true }
        bmc_required: { type: boolean }
        bmc_status: { type: string }
        bmc_checked_at: { type: string, format: date-time, nullable: true }
        ssh_status: { type: string }
        ssh_checked_at: { type: string, format: date-time, nullable: true }
        evidence_status: { type: string, enum: [ok, partial, stale, missing] }
        evidence_id: { type: integer, nullable: true }
        evidence_kinds:
          type: array
          items: { type: string, enum: [pxe, bmc, ssh, full] }
        latest_run_id: { type: integer, nullable: true }
        latest_run_status: { type: string, enum: [ok, warning, error, running] }
        latest_run_strict: { type: boolean }
        latest_run_kind: { type: string, enum: [strict_physical_targets, full_chain_target, pxe_http, pxe_dhcp, pxe_tftp, pxe_boot_event, bmc, ssh] }
        latest_run_result_status: { type: string, enum: [success, failed, skipped] }
        latest_run_at: { type: string, format: date-time, nullable: true }
        full_chain_ready: { type: boolean }
        blocking_reasons:
          type: array
          items: { type: string }
    LabValidationEvidenceRequest:
      type: object
      required: [kind, subject, summary]
      properties:
        kind: { type: string, enum: [pxe, bmc, ssh, full] }
        subject: { type: string, maxLength: 160 }
        status: { type: string, enum: [ok, warning, error], default: ok }
        summary: { type: string, maxLength: 500 }
        details: { type: string, maxLength: 4000 }
        artifact_url: { type: string, format: uri, maxLength: 500 }
        run_id:
          type: integer
          minimum: 1
          description: Optional for warning/error evidence. Required for ok BMC, ok SSH, and ok full-chain evidence. BMC/SSH evidence must reference a recent finished strict run that checked that capability and contains the target adapter=redfish|ipmi structured BMC identity proof details or SSH known_hosts host key proof plus command/exit_code/stdout proof details. SSH proof requires host_key_policy=known_hosts, host_key_verified=true, and host_key_sha256 in the referenced run details. Full-chain evidence must reference a recent finished strict run that checked PXE and SSH and contains successful target PXE results plus SSH known_hosts host key proof plus command/exit_code/stdout proof details; targets with BMC configured must also have adapter=redfish|ipmi BMC identity proof details in that run. The referenced run may have overall status error if only full_chain_target failed because full-chain evidence had not been recorded yet.
        server_id:
          type: integer
          minimum: 1
          description: Required for ok BMC, ok SSH, and ok full-chain evidence. Optional for ok PXE evidence. When paired with boot_event_id, the BootEvent must either reference the same server_id or match the server primary_mac.
        boot_event_id:
          type: integer
          minimum: 1
          description: Required for ok PXE and ok full-chain evidence. The referenced BootEvent must be within the freshness window and can prove the server by direct server_id or MAC-to-primary_mac matching.
    LabValidationReport:
      type: object
      properties:
        status: { type: string, enum: [ok, warning, error] }
        run_id: { type: integer }
        generated_at: { type: string, format: date-time }
        environment:
          type: object
          properties:
            app_env: { type: string }
            boot_base_url: { type: string }
            bmc_adapter: { type: string }
            collector_mode: { type: string }
            ssh_operations_mode: { type: string }
        checks:
          type: array
          items: { $ref: '#/components/schemas/LabValidationCheck' }
        pxe:
          type: object
          properties:
            enabled: { type: boolean }
            mode: { type: string, enum: [proxy, builtin, external] }
            bind_interface: { type: string }
            dhcp_listen_addr: { type: string }
            dhcp_server_ip: { type: string }
            dhcp_lease_start: { type: string }
            dhcp_lease_end: { type: string }
            tftp_listen_addr: { type: string }
            tftp_root: { type: string }
            bootfile_uefi: { type: string }
            bootfile_bios: { type: string }
            deployment_networks: { type: integer }
            boot_events: { type: integer }
            recent_boot_events:
              type: array
              items: { $ref: '#/components/schemas/LabBootEvent' }
            runtime_issues:
              type: array
              items: { $ref: '#/components/schemas/ConfigIssue' }
        bmc:
          type: object
          properties:
            adapter: { type: string }
            total: { type: integer }
            ok: { type: integer }
            error: { type: integer }
            unknown: { type: integer }
            last_checked_at: { type: string, format: date-time, nullable: true }
            recent_endpoints:
              type: array
              items: { $ref: '#/components/schemas/LabBMCRef' }
        ssh:
          type: object
          properties:
            collector_mode: { type: string }
            operations_mode: { type: string }
            total: { type: integer }
            ok: { type: integer }
            error: { type: integer }
            configured: { type: integer }
            unknown: { type: integer }
            last_checked_at: { type: string, format: date-time, nullable: true }
            recent_ssh_accesses:
              type: array
              items: { $ref: '#/components/schemas/LabSSHRef' }
        recent_evidence:
          type: array
          items: { $ref: '#/components/schemas/LabValidationEvidence' }
        targets:
          type: array
          items: { $ref: '#/components/schemas/LabValidationTarget' }
        recent_runs:
          type: array
          items: { $ref: '#/components/schemas/LabValidationRunSummary' }
        run_results:
          type: array
          items: { $ref: '#/components/schemas/LabValidationRunResult' }
    LabValidationRunRequest:
      type: object
      properties:
        check_pxe: { type: boolean, default: true }
        check_bmc: { type: boolean, default: true }
        check_ssh: { type: boolean, default: true }
        strict:
          type: boolean
          default: false
          description: When true, requires real physical targets instead of synthetic-only checks. PXE checks require pxe_macs and BMC/SSH checks require server_ids. BMC is optional per target; the simulated adapter is rejected only for requested targets that have BMC endpoints.
        limit: { type: integer, minimum: 1, maximum: 50, default: 20 }
        server_ids:
          type: array
          maxItems: 50
          uniqueItems: true
          description: Optional target server IDs. When present, BMC and SSH checks are limited to these physical assets. Missing SSH configuration is failed; missing BMC configuration is skipped because BMC is optional per target.
          items: { type: integer, minimum: 1 }
        pxe_macs:
          type: array
          maxItems: 20
          uniqueItems: true
          description: Optional real PXE client MAC addresses. Each MAC must have a recorded BootEvent to pass the pxe_boot_event check. When server_ids are also supplied in strict validation, each BootEvent must either carry one of those server_ids or match a requested server primary_mac.
          items: { type: string }
        pxe_probe_mac:
          type: string
          description: Optional MAC address used by synthetic PXE HTTP and DHCP probes.
        pxe_arch:
          type: integer
          enum: [0, 7, 9, 11]
          default: 9
          description: PXE architecture code used by the synthetic DHCP probe. 0 validates Legacy BIOS bootfile selection; 7, 9, and 11 validate common UEFI x86_64 paths.
        ssh_probe_command:
          type: string
          maxLength: 255
          description: Optional single-line command used for real SSH host proof. Defaults to a safe read-only hostname/user/kernel probe; stdout, stderr, and exit_code are summarized in the SSH run result.
    BackupValidationCheck:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    BackupValidationReport:
      type: object
      properties:
        status: { type: string, enum: [ok, warning, error] }
        version: { type: string }
        generated_at: { type: string, format: date-time }
        totals:
          type: object
          additionalProperties: { type: integer }
        target_counts:
          type: object
          additionalProperties: { type: integer }
        checks:
          type: array
          items: { $ref: '#/components/schemas/BackupValidationCheck' }
    BackupRestoreResult:
      type: object
      properties:
        status: { type: string, enum: [restored] }
        imported:
          type: object
          additionalProperties: { type: integer }
        warnings:
          type: array
          items: { $ref: '#/components/schemas/BackupValidationCheck' }
    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [admin, operator, viewer] }
    Tenant:
      type: object
      required: [tenant_id, name]
      properties:
        id:
          type: integer
          readOnly: true
        tenant_id:
          type: string
          pattern: '^[A-Za-z0-9][A-Za-z0-9._-]{0,79}$'
          description: Backend-owned after create. Update requests cannot change it.
        name: { type: string }
        status: { type: string, enum: [active, disabled], default: active }
        owner: { type: string }
        description: { type: string }
        quota:
          type: object
          additionalProperties: true
          description: Optional JSON object. Numeric quota values must be non-negative; quota.servers is enforced as a non-negative integer server asset limit.
    NetworkConfig:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        purpose: { type: string, enum: [management, deployment, business] }
        cidr:
          type: string
          description: Must be a valid CIDR prefix.
        gateway:
          type: string
          description: Optional IP address that must be inside cidr.
        dns: { type: string }
        vlan_id:
          type: integer
          minimum: 0
          maximum: 4094
        dhcp_mode: { type: string, enum: [proxy, builtin, external] }
        proxy_dhcp: { type: boolean }
        status: { type: string, enum: [enabled, disabled] }
        description: { type: string }
        created_by: { type: string }
    NetworkCheck:
      type: object
      properties:
        name: { type: string }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    NetworkCheckReport:
      type: object
      properties:
        status: { type: string, enum: [ok, warning, error] }
        checks:
          type: array
          items: { $ref: '#/components/schemas/NetworkCheck' }
    MetadataNetworkInterface:
      type: object
      properties:
        name: { type: string }
        mac: { type: string }
        address: { type: string }
        network_id: { type: integer }
        network_name: { type: string }
        cidr: { type: string }
        gateway: { type: string }
        dns:
          type: array
          items: { type: string }
        vlan_id: { type: integer }
        dhcp_mode: { type: string, enum: [proxy, builtin, external] }
        proxy_dhcp: { type: boolean }
    MetadataNetwork:
      type: object
      properties:
        interfaces:
          type: array
          items: { $ref: '#/components/schemas/MetadataNetworkInterface' }
    MetadataSSHKeys:
      type: object
      properties:
        keys:
          type: array
          items: { type: string }
    Server:
      type: object
      properties:
        id: { type: integer }
        asset_no:
          type: string
          description: Unique when non-empty.
        hostname:
          type: string
          description: Unique when non-empty. Saved in lowercase.
        status:
          type: string
          enum: [discovered, ready, deploying, running, maintenance, retired, scrapped]
          default: discovered
        architecture:
          type: string
          enum: [x86_64, arm64]
          default: x86_64
        primary_ip:
          type: string
          description: Optional valid IP address.
        primary_mac:
          type: string
          description: Optional valid MAC address. Saved in lowercase colon-separated form and unique when non-empty.
        owner: { type: string }
        tenant_id:
          type: string
          description: Optional. When provided on create, update, or import, it must reference an active tenant.
        location: { type: string }
        rack: { type: string }
        rack_unit: { type: string }
        tags:
          description: JSON array or object used for CMDB labels and keyword search.
          oneOf:
            - type: array
              items: { type: string }
            - type: object
              additionalProperties: true
        notes: { type: string }
    RetireServerRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 500
          description: Terminal lifecycle reason. Defaults according to the action when omitted.
        erase_status:
          type: string
          enum: [not_required, pending, verified, failed]
          default: not_required
        erase_method:
          type: string
          maxLength: 120
        evidence:
          type: string
          maxLength: 2000
          description: Required when erase_status is verified.
    RetirementRecord:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        from_status: { type: string }
        to_status: { type: string, enum: [retired, scrapped] }
        reason: { type: string }
        erase_status: { type: string, enum: [not_required, pending, verified, failed] }
        erase_method: { type: string }
        evidence: { type: string }
        requested_by: { type: string }
        requested_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    RetireServerResponse:
      type: object
      properties:
        status: { type: string, enum: [retired] }
        retirement: { $ref: '#/components/schemas/RetirementRecord' }
    ScrapServerResponse:
      type: object
      properties:
        status: { type: string, enum: [scrapped] }
        retirement: { $ref: '#/components/schemas/RetirementRecord' }
    Image:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        os_family: { type: string }
        os_version: { type: string }
        architecture: { type: string, enum: [x86_64, arm64], default: x86_64 }
        file_path:
          type: string
          description: Required for manual registration. Must resolve inside IMAGE_STORAGE_DIR. Relative paths are resolved under IMAGE_STORAGE_DIR. Updating this field resets verification to untested.
        size_bytes:
          type: integer
          format: int64
          readOnly: true
        sha256:
          type: string
          readOnly: true
        status: { type: string, enum: [enabled, disabled] }
        test_status:
          type: string
          enum: [untested, tested_passed, test_failed]
          readOnly: true
    InstallTemplate:
      type: object
      required: [name, template_type, content]
      properties:
        id:
          type: integer
          readOnly: true
        name: { type: string }
        os_family: { type: string }
        os_version: { type: string }
        template_type: { type: string, enum: [cloud-init, autoinstall, kickstart, preseed, unattend] }
        content: { type: string }
        variables_schema:
          type: object
          additionalProperties: true
        version: { type: string, default: v1 }
        status: { type: string, enum: [enabled, disabled], default: enabled }
        created_by:
          type: string
          readOnly: true
    WorkflowTemplate:
      type: object
      required: [name, definition]
      properties:
        id:
          type: integer
          readOnly: true
        name: { type: string }
        version: { type: string, default: v1 }
        description: { type: string }
        definition:
          type: object
          required: [steps]
          properties:
            steps:
              type: array
              minItems: 1
              items:
                type: object
                required: [name, action]
                properties:
                  name: { type: string }
                  action: { type: string }
        status: { type: string, enum: [enabled, disabled], default: enabled }
        created_by:
          type: string
          readOnly: true
    Deployment:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        image_id: { type: integer }
        template_id: { type: integer, nullable: true, minimum: 1 }
        workflow_id: { type: integer, nullable: true, minimum: 1 }
        network_id:
          type: integer
          nullable: true
          minimum: 1
          description: Optional selected enabled deployment network. When omitted, metadata falls back to the latest enabled deployment network for compatibility.
        variables:
          type: object
          additionalProperties: true
        erase_policy:
          type: string
          enum: [none, quick, full, external_verified]
          default: quick
          description: Deployment erase/reinstall policy selected before creation.
        erase_confirmed:
          type: boolean
          description: Must be true when creating a deployment.
        erase_confirmed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        status: { type: string }
        requested_by: { type: string }
        error_message: { type: string }
    DeploymentPreflightCheck:
      type: object
      properties:
        name: { type: string, enum: [target, active_deployment, network, bmc] }
        status: { type: string, enum: [ok, warning, error] }
        message: { type: string }
    DeploymentPreflightTarget:
      type: object
      properties:
        server_id: { type: integer }
        status: { type: string, enum: [ok, blocked] }
        power_control:
          type: string
          enum: [manual, bmc]
          description: bmc when the target has a configured BMC endpoint; manual when the operator must power/PXE boot the machine without BMC.
        checks:
          type: array
          items: { $ref: '#/components/schemas/DeploymentPreflightCheck' }
        problems:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        operator_actions:
          type: array
          description: Operator actions required before/while creating the deployment; populated for manual power/PXE targets without BMC.
          items: { type: string }
    DeploymentPreflightResult:
      type: object
      properties:
        status: { type: string, enum: [ok, blocked] }
        targets:
          type: array
          items: { $ref: '#/components/schemas/DeploymentPreflightTarget' }
        problems:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
    DeploymentLogSummary:
      type: object
      properties:
        deployment_id: { type: integer }
        status: { type: string }
        latest_run_id: { type: integer }
        total_runs: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, format: int64 }
        task_total: { type: integer }
        task_success: { type: integer }
        task_failed: { type: integer }
        task_cancelled: { type: integer }
        task_running: { type: integer }
        task_pending: { type: integer }
    WorkflowRunLog:
      type: object
      properties:
        id: { type: integer }
        attempt: { type: integer }
        deployment_id: { type: integer }
        name: { type: string }
        version: { type: string }
        status: { type: string }
        definition: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, format: int64 }
        task_total: { type: integer }
        task_success: { type: integer }
        task_failed: { type: integer }
        task_cancelled: { type: integer }
        task_running: { type: integer }
        task_pending: { type: integer }
    TaskExecutionLog:
      type: object
      properties:
        id: { type: integer }
        workflow_run_id: { type: integer }
        step_name: { type: string }
        action: { type: string }
        status: { type: string }
        retry_count: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        duration_ms: { type: integer, format: int64 }
        stdout: { type: string }
        stderr: { type: string }
        error_message: { type: string }
    DeploymentLogs:
      type: object
      properties:
        summary: { $ref: '#/components/schemas/DeploymentLogSummary' }
        workflow:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/WorkflowRunLog'
        runs:
          type: array
          items: { $ref: '#/components/schemas/WorkflowRunLog' }
        tasks:
          type: array
          items: { $ref: '#/components/schemas/TaskExecutionLog' }
    HardwareInventory:
      type: object
      properties:
        cpu_summary: { type: string }
        memory_summary: { type: string }
        disk_summary: { type: string }
        network_summary: { type: string }
        gpu_summary: { type: string }
        raid_summary: { type: string }
        collected_by: { type: string }
        raw_payload:
          type: object
          additionalProperties: true
    BmcEndpoint:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        type: { type: string, enum: [redfish, ipmi] }
        protocol: { type: string, enum: [http, https, ipmi] }
        endpoint:
          type: string
          description: Redfish requires an http/https URL and protocol must match the URL scheme; production Redfish rejects http:// endpoints and requires REDFISH_INSECURE_TLS=false with a trusted BMC certificate chain. IPMI requires a valid host/IP or host:port.
        username: { type: string }
        status: { type: string }
        power_state: { type: string }
    BMCFirmwareInfo:
      type: object
      properties:
        adapter: { type: string }
        endpoint_status: { type: string }
        stage:
          type: string
          enum: [config, connectivity]
          description: Failure stage on BMC check error responses.
        manufacturer: { type: string }
        manufacturer_id: { type: string }
        model: { type: string }
        product_id: { type: string }
        device_id: { type: string }
        device_revision: { type: string }
        serial_number: { type: string }
        firmware_version: { type: string }
        bios_version: { type: string }
        bmc_version: { type: string }
        last_checked_at: { type: string, format: date-time }
    BMCCheckResponse:
      type: object
      properties:
        status:
          type: string
          description: Latest BMC endpoint status, usually ok on 200 or error on 502.
        checked_at: { type: string, format: date-time }
        proof:
          $ref: '#/components/schemas/BMCFirmwareInfo'
        proof_error:
          type: string
          description: Non-sensitive firmware or hardware identity probe error when connectivity succeeded but the identity probe was incomplete.
        error: { type: string }
        detail:
          type: string
          description: Non-secret adapter error detail on 502 responses.
    BatchBmcPowerResult:
      type: object
      properties:
        server_id: { type: integer }
        status: { type: string, enum: [success, failed] }
        power_state: { type: string }
        error: { type: string }
    BatchBmcPowerResponse:
      type: object
      properties:
        requested: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/BatchBmcPowerResult' }
    SSHAccess:
      type: object
      properties:
        server_id: { type: integer }
        host:
          type: string
          description: Valid hostname or IP address.
        port: { type: integer, minimum: 1, maximum: 65535, default: 22 }
        username: { type: string }
        auth_type: { type: string, enum: [password, private_key], default: password }
        status: { type: string }
    SSHCheckProof:
      type: object
      properties:
        command:
          type: string
          description: Read-only command used for the connectivity proof.
        exit_code: { type: integer }
        stage:
          type: string
          enum: [lookup, request, config, dial, handshake, session, command]
          description: Failure stage when the SSH check did not complete successfully.
        stdout:
          type: string
          description: Truncated stdout from the proof command.
        stderr:
          type: string
          description: Truncated stderr from the proof command.
        host_key_policy: { type: string, enum: [insecure_ignore, known_hosts] }
        host_key_verified:
          type: boolean
          description: true only when SSH_HOST_KEY_POLICY=known_hosts and the host key verifier accepted the key.
        host_key_algorithm: { type: string }
        host_key_sha256:
          type: string
          description: Non-secret SSH host key SHA256 fingerprint, for example SHA256:....
        host_key_host: { type: string }
        host_key_remote: { type: string }
    SSHCheckResponse:
      type: object
      properties:
        status: { type: string }
        checked_at: { type: string, format: date-time }
        proof: { $ref: '#/components/schemas/SSHCheckProof' }
        error: { type: string }
        detail: { type: string }
    TerminalCommandRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
          maxLength: 4000
          description: Command appended to an active terminal session. Requires X-Confirm-Action ops.terminal.command.
    MetricSample:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        metric_name:
          type: string
          description: Examples include host_up, cpu_usage, memory_usage, disk_usage, disk_smart_health, network_rx_mbps, and network_tx_mbps. disk_smart_health uses 0 for healthy and 1 for abnormal.
        value: { type: number }
        unit: { type: string }
        collected_at: { type: string, format: date-time }
    CollectionJob:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        mode: { type: string }
        status: { type: string }
        requested_by: { type: string }
        started_at: { type: string, format: date-time, nullable: true }
        finished_at: { type: string, format: date-time, nullable: true }
        error_message: { type: string }
    LogEvent:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        source: { type: string }
        level: { type: string }
        message: { type: string }
        trace_id: { type: string }
        occurred_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
    LogCollectionResult:
      type: object
      properties:
        server_id: { type: integer }
        status: { type: string, enum: [success, failed] }
        events:
          type: array
          items: { type: integer }
        error: { type: string }
    LogCollectionResponse:
      type: object
      properties:
        requested: { type: integer }
        succeeded: { type: integer }
        failed: { type: integer }
        events_created: { type: integer }
        results:
          type: array
          items: { $ref: '#/components/schemas/LogCollectionResult' }
    TerminalSession:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        status: { type: string, enum: [active, closed] }
        mode: { type: string, enum: [simulated, ssh] }
        requested_by: { type: string }
        reason: { type: string, maxLength: 255 }
        transcript: { type: string }
        opened_at: { type: string, format: date-time }
        closed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
    Alert:
      type: object
      properties:
        id: { type: integer }
        server_id: { type: integer }
        severity: { type: string }
        status: { type: string }
        rule_id: { type: string }
        title: { type: string }
        description: { type: string }
        acknowledged_by: { type: string }
        resolved_by: { type: string }
        triggered_at: { type: string, format: date-time }
    AlertEvaluationResponse:
      type: object
      properties:
        created:
          type: integer
          description: Number of new firing alerts created.
        deduplicated:
          type: integer
          description: Number of matching firing or acknowledged alerts refreshed instead of duplicated.
        alerts:
          type: array
          items: { $ref: '#/components/schemas/Alert' }
    AlertRule:
      type: object
      properties:
        id: { type: integer }
        rule_id: { type: string }
        name: { type: string }
        description: { type: string }
        metric_name: { type: string }
        operator: { type: string, enum: ['>', '>=', '<', '<=', '=='] }
        threshold: { type: number }
        severity: { type: string, enum: [critical, warning, info] }
        status: { type: string, enum: [enabled, disabled] }
        created_by: { type: string }
    AuditLog:
      type: object
      properties:
        id: { type: integer }
        actor_email: { type: string }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        risk_level: { type: string }
        request_id: { type: string }
        client_ip: { type: string }
        created_at: { type: string, format: date-time }
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
    NotFound:
      description: Resource not found.
    ConfirmationRequired:
      description: X-Confirm-Action header is required for this operation.
paths:
  /healthz:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Check service health.
      description: Checks database connectivity and Redis PING when REDIS_ADDR is configured.
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
        '503':
          description: Database or Redis health check failed.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthStatus' }
  /readyz:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Check runtime readiness.
      description: Checks database, Redis, image storage, BMC tooling, SSH known_hosts coverage, PXE/DHCP/TFTP runtime probes, and configuration validation issues. With BMC_ADAPTER=ipmi, the bmc_tooling check verifies ipmitool is available in PATH. With SSH_HOST_KEY_POLICY=known_hosts, ssh_known_hosts statically checks configured SSH targets against known_hosts patterns, including plain hostnames, [host]:port entries, wildcards, and OpenSSH |1|... hashed host patterns. When BOOT_SERVICES_ENABLED=true, pxe_services probes TFTP boot.ipxe over UDP using common RRQ options (blksize, timeout, tsize) and requires OACK negotiation, then in proxy/builtin mode sends a synthetic PXE DHCPDISCOVER to verify option 54 server_identifier, BOOTP next_server/siaddr, option 66 tftp_server_name, option 67 bootfile, and BOOTP file without recording a BootEvent.
      responses:
        '200':
          description: Readiness report.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReadinessStatus' }
  /boot/ipxe:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Render server-specific iPXE script and auto-discover unknown MACs.
      description: Records BootEvent source as http_ipxe only when the client IP is inside an enabled deployment network CIDR; HTTP iPXE requests from outside deployment networks, or requests with X-Lab-Validation-Probe set to 1/true, are recorded as api_event for troubleshooting and do not prove physical PXE.
      parameters:
        - { name: mac, in: query, schema: { type: string } }
        - { name: arch, in: query, schema: { type: string } }
        - { name: firmware, in: query, schema: { type: string } }
      responses:
        '200': { description: iPXE script. }
  /boot/discovery.ipxe:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Render discovery iPXE script.
      responses:
        '200': { description: Discovery iPXE script. }
  /boot/linux-installer.ipxe:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Render generic Linux installer iPXE script.
      responses:
        '200': { description: Linux installer iPXE script. }
  /boot/events:
    post:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Record boot event, matching deployment context, and auto-discover unknown MACs.
      responses:
        '201': { description: Boot event recorded. }
  /metadata/instance-id:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata instance id by client IP.
      responses:
        '200': { description: Instance id text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/hostname:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata hostname by client IP.
      responses:
        '200': { description: Hostname text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/network:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return metadata network JSON by client IP.
      responses:
        '200':
          description: Network metadata JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataNetwork' }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/ssh-keys:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return SSH public keys by client IP.
      responses:
        '200':
          description: SSH public keys JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MetadataSSHKeys' }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /metadata/userdata:
    get:
      servers:
        - url: http://localhost:8080
      security: []
      summary: Return rendered userdata by client IP.
      responses:
        '200': { description: Userdata text. }
        '403': { description: Metadata access is only allowed from enabled deployment networks when configured. }
        '404': { description: Client IP did not match a server. }
  /userdata:
