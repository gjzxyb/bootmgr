services:
  # Development/demo compose. For real PXE/DHCP/TFTP on Linux, use the
  # standalone docker-compose.production.yml with a reviewed ../.env.production.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: baremetal
      POSTGRES_USER: baremetal
      POSTGRES_PASSWORD: baremetal
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baremetal -d baremetal"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  backend:
    build: ../backend
    env_file: ../.env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_API_ROOT_URL: ${VITE_API_ROOT_URL:-}
        VITE_API_PORT: ${VITE_API_PORT:-8080}
        VITE_IMAGE_UPLOAD_MAX_MB: ${VITE_IMAGE_UPLOAD_MAX_MB:-${IMAGE_UPLOAD_MAX_MB:-20}}
        VITE_SHOW_DEMO_CREDENTIALS: ${VITE_SHOW_DEMO_CREDENTIALS:-true}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  postgres-data:
  backend-data:
